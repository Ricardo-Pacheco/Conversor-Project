<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>Ricardo's Conversor</title>
</head>

<body>
    <img class="logo" src="./assets/logoProjeto.gif" alt="logo-projeto-conversor">

    <main>
        <label>
            Converter <b>de:</b>
            <select class="currency-select">
                <option value="real">R$ Real Brasileiro</option>
                <option value="dolar">US$ Dólar Americano</option>
                <option value="euro">€ Euro</option>
                <option value="libra">€ Libra </option>
                <option value="bitcoin">BitCoin</option>
            </select>
        </label>

        <label>
            Converter <b>para:</b>
            <select class="converted-select">
                <option value="real1">R$ Real Brasileiro</option>
                <option value="dolar1">US$ Dólar Americano</option>
                <option value="euro1">€ Euro</option>
                <option value="libra1">€ Libra </option>
                <option value="bitcoin1">BitCoin</option>
            </select>
        </label>

        <label>
            Valor:
            <input class="input-currency" placeholder="Ex: 500.55">
        </label>

        <button class="botao-conversor">Converter</button>

        <section>
            <div class="box">
                <img src="./assets/real.png" alt="logo-real-brasleiro">
                <p class="light">Real</p>
                <p class="dark-to-convert">R$ 0,00</p>
            </div>

            <img class="seta" src="./assets/arrow.png" alt="seta">

            <div class="box">
                <img class="currency-img" src="./assets/dollar.png" alt="moeda-convertida">
                <p class="light" id="currency-name">Dólar Americano</p>
                <p class="dark">US$ 0,00</p>
            </div>
        </section>
    </main>
</body>
<script src="./script.js"></script>
</html>
